[advisories]
yanked = "warn"
ignore = [
    # https://rustsec.org/advisories/RUSTSEC-2024-0436 paste! is unmaintained
    "RUSTSEC-2024-0436",
    # https://rustsec.org/advisories/RUSTSEC-2025-0141 bincode is unmaintained
    "RUSTSEC-2025-0141",
    # https://rustsec.org/advisories/RUSTSEC-2026-0097 rand is unsound with a custom logger
    "RUSTSEC-2026-0097",
    # https://rustsec.org/advisories/RUSTSEC-2024-0320 yaml-rust is unmaintained, transitive dep
    "RUSTSEC-2024-0320",
    # https://rustsec.org/advisories/RUSTSEC-2024-0388 derivative is unmaintained, transitive dep
    "RUSTSEC-2024-0388",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "0BSD",
    "CC0-1.0",
    "ISC",
    "Unlicense",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "LicenseRef-rustls-webpki",
]

[[licenses.clarify]]
name = "rustls-webpki"
expression = "LicenseRef-rustls-webpki"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
multiple-versions = "warn"
deny = [{ name = "openssl" }]

[sources]
unknown-registry = "warn"
unknown-git = "deny"
allow-git = [
    "https://github.com/tempoxyz/tempo",
    "https://github.com/paradigmxyz/reth",
]
