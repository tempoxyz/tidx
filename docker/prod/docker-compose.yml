services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tidx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tidx}
      POSTGRES_DB: tidx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_wal_size=16GB
      - -c
      - checkpoint_timeout=30min
      - -c
      - synchronous_commit=off
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=64MB
      - -c
      - wal_level=minimal
      - -c
      - max_wal_senders=0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidx -d tidx"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgroll-bootstrap:
    profiles:
      - migrations
    platform: linux/amd64
    image: ghcr.io/tempoxyz/tidx:${TIDX_IMAGE_TAG:-latest}
    environment:
      PGROLL_POSTGRES_URLS: ${PGROLL_POSTGRES_URLS:-postgres://tidx:${POSTGRES_PASSWORD:-tidx}@postgres:5432/tidx_moderato?sslmode=disable postgres://tidx:${POSTGRES_PASSWORD:-tidx}@postgres:5432/tidx_mainnet?sslmode=disable}
      PGROLL_BASELINE_VERSION: ${PGROLL_BASELINE_VERSION:-20260415_prod_baseline}
    entrypoint: ["sh", "-ec"]
    command:
      - |
        for postgres_url in $${PGROLL_POSTGRES_URLS}; do
          echo "Bootstrapping pgroll for $${postgres_url}"
          tidx pgroll init --postgres-url "$${postgres_url}"
          mkdir -p "/tmp/pgroll-baseline/$$(basename "$${postgres_url%%\?*}")"
          tidx pgroll baseline "$${PGROLL_BASELINE_VERSION}" "/tmp/pgroll-baseline/$$(basename "$${postgres_url%%\?*}")" --yes --json --postgres-url "$${postgres_url}"
        done
    depends_on:
      postgres:
        condition: service_healthy

  pgroll-migrate:
    profiles:
      - migrations
    platform: linux/amd64
    image: ghcr.io/tempoxyz/tidx:${TIDX_IMAGE_TAG:-latest}
    environment:
      PGROLL_POSTGRES_URLS: ${PGROLL_POSTGRES_URLS:-postgres://tidx:${POSTGRES_PASSWORD:-tidx}@postgres:5432/tidx_moderato?sslmode=disable postgres://tidx:${POSTGRES_PASSWORD:-tidx}@postgres:5432/tidx_mainnet?sslmode=disable}
    entrypoint: ["sh", "-ec"]
    command:
      - |
        for postgres_url in $${PGROLL_POSTGRES_URLS}; do
          echo "Running pgroll migrations for $${postgres_url}"
          tidx pgroll init --postgres-url "$${postgres_url}" || true
          tidx pgroll migrate /db/pgroll --complete --postgres-url "$${postgres_url}"
          status="$$(tidx pgroll status --postgres-url "$${postgres_url}")"
          if ! echo "$${status}" | grep -q '"version": "20260430_add_blocks_consensus_proposer"'; then
            echo "pgroll migration did not reach expected version for $${postgres_url}:" >&2
            echo "$${status}" >&2
            exit 1
          fi
        done
    depends_on:
      postgres:
        condition: service_healthy

  tidx:
    platform: linux/amd64
    image: ghcr.io/tempoxyz/tidx:${TIDX_IMAGE_TAG:-latest}
    command:
      - up
      - --config
      - /config.toml
    ports:
      - "8080:8080"   # HTTP API
      - "9090:9090"   # Prometheus metrics
    volumes:
      - ./config.toml:/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG:-tidx=info}
      RUST_LOG_FORMAT: ${RUST_LOG_FORMAT:-pretty}
    restart: unless-stopped

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    restart: unless-stopped
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
