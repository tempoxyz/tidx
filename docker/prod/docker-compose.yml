services:
  postgres:
    image: ghcr.io/tempoxyz/postgres-pgduckdb-tidx:latest
    environment:
      POSTGRES_USER: tidx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tidx}
      POSTGRES_DB: tidx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - parquet_data:/data  # Parquet files for archived logs
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_duckdb
      - -c
      - max_wal_size=16GB
      - -c
      - checkpoint_timeout=30min
      - -c
      - synchronous_commit=off
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidx -d tidx"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tidx:
    platform: linux/amd64
    # TODO: use latest tag
    image: ghcr.io/tempoxyz/tidx:6cb137c
    command:
      - up
      - --config
      - /config.toml
    ports:
      - "8080:8080"   # HTTP API
      - "9090:9090"   # Prometheus metrics
    volumes:
      - ./config.toml:/config.toml:ro
      - parquet_data:/data  # Shared Parquet storage (tidx writes, pg_duckdb reads)
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG:-tidx=info}
      RUST_LOG_FORMAT: ${RUST_LOG_FORMAT:-pretty}
    restart: unless-stopped

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    restart: unless-stopped
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
  parquet_data:  # Shared volume for Parquet files (tidx compress → pg_duckdb query)
  prometheus_data:
  grafana_data:
