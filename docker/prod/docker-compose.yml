services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tidx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tidx}
      POSTGRES_DB: tidx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_wal_size=16GB
      - -c
      - checkpoint_timeout=30min
      - -c
      - synchronous_commit=off
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=64MB
      # Logical replication for ClickHouse MaterializedPostgreSQL
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidx -d tidx"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tidx:
    platform: linux/amd64
    # TODO: use latest tag
    image: ghcr.io/tempoxyz/tidx:6cb137c
    command:
      - up
      - --config
      - /config.toml
    ports:
      - "8080:8080"   # HTTP API
      - "9090:9090"   # Prometheus metrics
    volumes:
      - ./config.toml:/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG:-tidx=info}
      RUST_LOG_FORMAT: ${RUST_LOG_FORMAT:-pretty}
    restart: unless-stopped

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    restart: unless-stopped
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
