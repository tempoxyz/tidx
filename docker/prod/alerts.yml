groups:
  - name: tidx_sync
    rules:
      # PostgreSQL sync lag - blocks behind chain head
      - alert: TidxSyncLagHigh
        expr: tidx_sync_lag_blocks > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Sync lag high on chain {{ $labels.chain_id }}"
          description: "PostgreSQL is {{ $value }} blocks behind chain head"

      - alert: TidxSyncLagCritical
        expr: tidx_sync_lag_blocks > 100
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Sync lag critical on chain {{ $labels.chain_id }}"
          description: "PostgreSQL is {{ $value }} blocks behind chain head"

      # Sync rate dropped to zero (stalled)
      - alert: TidxSyncStalled
        expr: tidx_sync_blocks_per_second == 0 and tidx_sync_lag_blocks > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Sync stalled on chain {{ $labels.chain_id }}"
          description: "No blocks synced in 5 minutes, lag is {{ $value }} blocks"

  - name: tidx_clickhouse
    rules:
      # ClickHouse query errors
      - alert: TidxClickHouseErrors
        expr: rate(tidx_clickhouse_queries_total{success="false"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ClickHouse query errors"
          description: "Error rate: {{ $value | printf \"%.2f\" }}/s"

      # ClickHouse query latency
      - alert: TidxClickHouseLatencyHigh
        expr: histogram_quantile(0.99, rate(tidx_clickhouse_query_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High ClickHouse query latency"
          description: "p99 latency is {{ $value | printf \"%.1f\" }}s"

  - name: tidx_rpc
    rules:
      # RPC error rate
      - alert: TidxRPCErrorRate
        expr: rate(tidx_rpc_requests_total{success="false"}[5m]) / rate(tidx_rpc_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High RPC error rate for {{ $labels.method }}"
          description: "{{ $value | printf \"%.1f\" }}% of requests failing"

      # RPC latency
      - alert: TidxRPCLatencyHigh
        expr: histogram_quantile(0.99, rate(tidx_rpc_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High RPC latency for {{ $labels.method }}"
          description: "p99 latency is {{ $value | printf \"%.1f\" }}s"

  - name: tidx_queries
    rules:
      # Query latency
      - alert: TidxQueryLatencyHigh
        expr: histogram_quantile(0.99, rate(tidx_query_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High query latency"
          description: "p99 query latency is {{ $value | printf \"%.1f\" }}s"
