services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tidx
      POSTGRES_PASSWORD: tidx
      POSTGRES_DB: tidx
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_wal_size=4GB
      - -c
      - checkpoint_timeout=30min
      - -c
      - synchronous_commit=off
      # Logical replication for ClickHouse MaterializedPostgreSQL
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidx -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  tempo:
    platform: linux/amd64
    image: ghcr.io/tempoxyz/tempo:latest
    command:
      - node
      - --dev
      - --dev.block-time
      - "200ms"
      - --dev.mnemonic
      - "test test test test test test test test test test test junk"
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "8545"
      - --http.api
      - "all"
      - --datadir
      - /data
      - --builder.gaslimit
      - "3000000000"
    ports:
      - "8545:8545"
    tmpfs:
      - /data

  tidx:
    build:
      context: ../..
      dockerfile: Dockerfile
    command:
      - up
      - --config
      - /config.toml
    ports:
      - "8080:8080"   # HTTP API
      - "9090:9090"   # Prometheus metrics
    volumes:
      - ./config.toml:/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started
    environment:
      RUST_LOG: tidx=info
    restart: on-failure

  # Continuous transaction generator (restarts every 60s to keep generating)
  bench:
    platform: linux/amd64
    image: ghcr.io/tempoxyz/tempo-bench:latest
    command:
      - run-max-tps
      - --duration
      - "60"
      - --tps
      - "${BENCH_TPS:-500}"
      - --accounts
      - "5"
      - --target-urls
      - "http://tempo:8545"
      - --disable-2d-nonces
      - --mnemonic
      - "test test test test test test test test test test test junk"
      - --tip20-weight
      - "1"
      - --erc20-weight
      - "1"
      - --swap-weight
      - "1"
    depends_on:
      tempo:
        condition: service_started
    restart: always

volumes:
  postgres_data:
