services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ak47
      POSTGRES_PASSWORD: ak47
      POSTGRES_DB: ak47_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ak47 -d ak47_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  tempo:
    platform: linux/amd64
    image: ghcr.io/tempoxyz/tempo:latest
    command:
      - node
      - --dev
      - --dev.block-time
      - "1sec"
      - --dev.mnemonic
      - "test test test test test test test test test test test junk"
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "8545"
      - --http.api
      - "all"
      - --datadir
      - /data
      - --builder.gaslimit
      - "3000000000"
    ports:
      - "8545:8545"
    tmpfs:
      - /data
      
  ak47:
    build: .
    command:
      - up
      - --rpc
      - "http://tempo:8545"
      - --db
      - "postgres://ak47:ak47@timescaledb:5432/ak47_test"
    depends_on:
      timescaledb:
        condition: service_healthy
      tempo:
        condition: service_started
    environment:
      RUST_LOG: ak47=info
    restart: on-failure

  # Continuous transaction generator (restarts every 60s to keep generating)
  bench:
    platform: linux/amd64
    image: ghcr.io/tempoxyz/tempo-bench:latest
    command:
      - run-max-tps
      - --duration
      - "60"
      - --tps
      - "${BENCH_TPS:-500}"
      - --accounts
      - "5"
      - --target-urls
      - "http://tempo:8545"
      - --disable-2d-nonces
      - --mnemonic
      - "test test test test test test test test test test test junk"
      - --tip20-weight
      - "1"
      - --erc20-weight
      - "1"
      - --swap-weight
      - "1"
    depends_on:
      tempo:
        condition: service_started
    restart: always
