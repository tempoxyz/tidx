# TIDX Indexer Configuration

[http]
enabled = true
port = 8080
bind = "0.0.0.0"

[prometheus]
enabled = true
port = 9090

[[chains]]
name = "moderato"
chain_id = 42431
rpc_url = "https://eng:aphex-twin-jeff-mills@rpc.moderato.tempo.xyz"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_moderato"
backfill = true
batch_size = 500
concurrency = 8

# ClickHouse OLAP engine (optional)
# Uses MaterializedPostgreSQL for real-time WAL replication.
# Each instance gets its own replication stream from PostgreSQL.
# Queries go to the primary; failover instances are tried on connection failure.
[chains.clickhouse]
enabled = false
url = "http://clickhouse:8123"
# failover_urls = ["http://clickhouse-2:8123"]

[[chains]]
name = "mainnet"
chain_id = 4217
rpc_url = "https://eng:aphex-twin-jeff-mills@rpc.tempo.xyz"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_mainnet"
backfill = true
batch_size = 500
concurrency = 8

# ClickHouse OLAP engine (optional)
[chains.clickhouse]
enabled = false
url = "http://clickhouse:8123"
# failover_urls = ["http://clickhouse-2:8123"]
