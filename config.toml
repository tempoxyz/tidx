# TIDX Indexer Configuration

[http]
enabled = true
port = 8080
bind = "0.0.0.0"

[prometheus]
enabled = true
port = 9090

[[chains]]
name = "moderato"
chain_id = 42431
rpc_url = "https://eng:aphex-twin-jeff-mills@rpc.moderato.tempo.xyz"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_moderato"
backfill = true
batch_size = 500
concurrency = 8

# pg_duckdb settings for OLAP queries
pg_duckdb_memory_limit = "16GB"
pg_duckdb_threads = 8

[[chains]]
name = "mainnet"
chain_id = 4217
rpc_url = "https://eng:aphex-twin-jeff-mills@rpc.tempo.xyz"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx_mainnet"
backfill = true
batch_size = 500
concurrency = 8
pg_duckdb_memory_limit = "16GB"
pg_duckdb_threads = 8
