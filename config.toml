# AK47 Indexer Configuration

# Use timescaledb for docker, localhost for local dev
database_url = "postgres://ak47:ak47@timescaledb:5432/ak47"

[http]
enabled = true
port = 8080
bind = "0.0.0.0"

[prometheus]
enabled = true
port = 9090

# Chains to index
[[chains]]
name = "moderato"
chain_id = 42431
rpc_url = "https://rpc.moderato.tempo.xyz"
backfill = true
batch_size = 100

